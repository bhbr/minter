<!doctype html>
<html class="no-js" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>exploring complex functions</title>
<script type="text/javascript" src="./CindyJS/build/js/Cindy.js"></script>
<script id="csinit" type="text/x-cindyscript">
    resetclock();
    W(x, p, l, f) := 0.5 * (1 + sin(|x - p| / l - seconds()*f));
    drawcmd() := (colorplot([0, W(#, A0, 0.1, 5) + W(#, A1, 0.1, 5), 0]););
</script>
<script id="csdraw" type="text/x-cindyscript">
drawcmd();
</script>
<script type="text/javascript">

var cdy = CindyJS({
  ports: [{
    id: "CSCanvas",
      width: 500,
      height: 500,
      transform: [ { visibleRect: [0, 1, 1, 0] } ] 
  }],
  scripts: "cs*",
  geometry: [
    {name: "A0", kind: "P", type: "Free", pos: [0.5, 0.25]},
    {name: "A1", kind: "P", type: "Free", pos: [0.5, 0.75]}
  ],
  animation: {autoplay: true},
});




</script>
  </head>
  <body class="with-footer">

    
  
  <div id="CSCanvas"></div>

<div>

</div>
</div>


  </body>
</html>
